services:
  db:
    image: postgres:16-alpine
    container_name: vibe-code-workspace-db
    environment:
      POSTGRES_DB: vibe_code_workspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibe_code_workspace"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
