<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>

<title>Forgot Password - VibeCode</title>

                        "surface-container-lowest": "#ffffff",

                        "surface-tint": "#005ac2",

                        "on-primary-fixed-variant": "#004395",

                        "on-background": "#1b1c1c",

                        "surface-dim": "#dcd9d9",
                        "surface": "#fcf9f8",
                        "outline": "#727785",
                        "inverse-on-surface": "#f3f0ef",
                        "on-primary": "#ffffff",
                        "background": "#fcf9f8",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary-fixed-variant": "#723600",
                        "secondary": "#a33e00",
                        "on-tertiary-container": "#fffbff",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "12px",
                        "stack-lg": "16px",

                        "gutter": "16px",
                        "container-max": "1100px",

                    "fontFamily": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Minimalist Input Focus */
        input:focus {
            outline: none;
            border-color: #0058be; /* primary */
            box-shadow: none;
        }
    </style>
</head>
<body class="h-full bg-background text-on-background font-body-md flex flex-col items-center pt-[102px]">
<!-- Main Container - Functional Minimalism, Low-Chrome -->
<main class="w-full max-w-[400px] px-margin-mobile md:px-0 flex flex-col gap-stack-lg">
<!-- Header -->
<header class="flex flex-col gap-stack-sm mb-stack-md">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Forgot Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we'll send you a link to reset your password.</p>
</header>
<!-- Form Area -->
<form class="flex flex-col gap-stack-lg" id="reset-form">
<!-- Email Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md px-[12px] py-[8px] rounded-DEFAULT focus:border-primary focus:ring-0 transition-colors duration-200" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-stack-md mt-stack-sm">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md px-[16px] py-[10px] rounded-DEFAULT hover:bg-primary-container transition-colors duration-200 text-center" type="submit">
                    Reset Password
                </button>
<a class="w-full text-center font-label-md text-label-md text-primary hover:underline transition-all duration-200 py-[8px]" href="#">
                    Return to Login
                </a>
</div>
</form>
<!-- Success Message (Initially Hidden) -->
<div class="hidden mt-stack-md p-stack-lg bg-surface-container border border-outline-variant rounded-DEFAULT flex-col gap-stack-sm items-start" id="success-message">
<div class="flex items-center gap-[8px] text-primary">
<span class="material-symbols-outlined text-[20px]" data-icon="check_circle">check_circle</span>
<span class="font-headline-md text-headline-md">Email Sent</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">
                If an account exists for that email, a password reset link will be sent shortly. Please check your inbox and spam folder.
            </p>
</div>
</main>
<script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate form submission
            const form = document.getElementById('reset-form');
            const successMessage = document.getElementById('success-message');
            const submitBtn = form.querySelector('button[type="submit"]');
            const emailInput = document.getElementById('email');

            // Loading state
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            emailInput.disabled = true;

            setTimeout(() => {
                form.classList.add('hidden');
                successMessage.classList.remove('hidden');
                successMessage.classList.add('flex');
            }, 800);
        });
    </script>
</body></html>
